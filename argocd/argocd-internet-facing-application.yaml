apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-internet-facing-application
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/felixngwhuk/opentelemetry-devops-demo-gitops.git
    targetRevision: main
    path: apps/argocd-internet-facing
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
