apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-demo-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/felixngwhuk/opentelemetry-devops-demo-gitops.git
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true